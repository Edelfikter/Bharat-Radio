<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALL INDIA PUBLIC RADIO</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/map.css">
  <link rel="stylesheet" href="/css/panels.css">
  <link rel="stylesheet" href="/css/chat.css">
</head>
<body>
  <!-- CRT scanline overlay -->
  <div class="crt-overlay"></div>

  <!-- Top bar -->
  <div id="topbar">
    <div id="topbar-title">
      <span class="blink">▶</span> ALL INDIA PUBLIC RADIO
    </div>
    <div id="topbar-stats">
      <span id="stat-stations">STATIONS: --</span>
      <span id="stat-live">LIVE: --</span>
      <span id="stat-users">USERS: --</span>
      <span id="stat-listeners">ONLINE: --</span>
    </div>
    <div id="topbar-auth">
      <span id="auth-user-display"></span>
      <button id="btn-login" class="btn-terminal">LOGIN</button>
      <button id="btn-register" class="btn-terminal">REGISTER</button>
      <button id="btn-logout" class="btn-terminal hidden">LOGOUT</button>
      <button id="btn-new-station" class="btn-terminal btn-accent hidden">+ NEW STATION</button>
    </div>
  </div>

  <!-- Map container -->
  <div id="map"></div>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span id="auth-modal-title">LOGIN</span>
        <button class="btn-close" id="auth-modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div id="auth-error" class="error-msg hidden"></div>
        <div class="form-group">
          <label>CALLSIGN</label>
          <input type="text" id="auth-username" class="input-terminal" placeholder="username" maxlength="32" autocomplete="username">
        </div>
        <div class="form-group">
          <label>PASSPHRASE</label>
          <input type="password" id="auth-password" class="input-terminal" placeholder="min 6 chars" autocomplete="current-password">
        </div>
        <button id="auth-submit" class="btn-terminal btn-accent btn-full">AUTHENTICATE</button>
        <div id="auth-mode-switch" style="margin-top:12px;text-align:center;font-size:12px;">
          <span id="auth-switch-text">No account? </span>
          <button id="auth-mode-btn" class="btn-link">REGISTER</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Station Create/Edit Panel -->
  <div id="station-form-panel" class="panel hidden">
    <div class="panel-header" id="station-form-header">
      <span id="station-form-title">NEW STATION</span>
      <button class="btn-close" id="station-form-close">✕</button>
    </div>
    <div class="panel-body">
      <div id="station-form-error" class="error-msg hidden"></div>
      <div class="form-group">
        <label>STATION NAME</label>
        <input type="text" id="sf-name" class="input-terminal" placeholder="Station name" maxlength="64">
      </div>
      <div class="form-group">
        <label>DESCRIPTION</label>
        <textarea id="sf-desc" class="input-terminal" rows="3" maxlength="256" placeholder="Optional description"></textarea>
      </div>
      <div class="form-group">
        <label>COORDINATES</label>
        <div style="display:flex;gap:8px;">
          <input type="number" id="sf-lat" class="input-terminal" placeholder="Latitude" step="any">
          <input type="number" id="sf-lng" class="input-terminal" placeholder="Longitude" step="any">
        </div>
        <small class="hint-text">Or click on map to set location</small>
      </div>
      <input type="hidden" id="sf-station-id">
      <button id="sf-submit" class="btn-terminal btn-accent btn-full">TRANSMIT</button>
    </div>
  </div>

  <!-- Station Detail Panel -->
  <div id="station-panel" class="panel hidden">
    <div class="panel-header" id="station-panel-header">
      <span id="sp-name">STATION</span>
      <button class="btn-close" id="station-panel-close">✕</button>
    </div>
    <div class="panel-body">
      <div id="sp-owner" class="detail-row"><span class="label">OPERATOR:</span> <span id="sp-owner-val"></span></div>
      <div id="sp-desc" class="detail-row"><span class="label">SIGNAL:</span> <span id="sp-desc-val"></span></div>
      <div id="sp-status" class="detail-row">
        <span class="label">STATUS:</span>
        <span id="sp-status-val" class="status-offline">OFFLINE</span>
      </div>

      <!-- Now Playing -->
      <div id="now-playing-section" class="hidden">
        <div class="section-divider">NOW PLAYING</div>
        <div id="np-segment-title"></div>
        <div id="np-progress-wrap">
          <div id="np-progress-bar"><div id="np-progress-fill"></div></div>
          <div id="np-time"></div>
        </div>
        <div id="np-youtube-embed"></div>
      </div>

      <!-- Owner controls -->
      <div id="owner-controls" class="hidden">
        <div class="section-divider">CONTROLS</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button id="sp-btn-live" class="btn-terminal btn-accent">GO LIVE</button>
          <button id="sp-btn-stop" class="btn-terminal btn-danger hidden">STOP</button>
          <button id="sp-btn-edit" class="btn-terminal">EDIT</button>
          <button id="sp-btn-delete" class="btn-terminal btn-danger">DELETE</button>
        </div>
      </div>

      <!-- Segments section -->
      <div class="section-divider">PLAYLIST</div>
      <div id="segments-list"></div>

      <!-- Add segment form (owner only) -->
      <div id="add-segment-form" class="hidden">
        <div class="section-divider">ADD SEGMENT</div>
        <div class="form-group">
          <label>TYPE</label>
          <select id="seg-type" class="input-terminal">
            <option value="youtube">YOUTUBE</option>
            <option value="tts">TEXT-TO-SPEECH</option>
          </select>
        </div>
        <div id="seg-youtube-fields">
          <div class="form-group">
            <label>YOUTUBE URL OR ID</label>
            <div style="display:flex;gap:8px;">
              <input type="text" id="seg-yt-id" class="input-terminal" placeholder="Video ID or URL">
              <button id="seg-yt-validate" class="btn-terminal">VERIFY</button>
            </div>
            <div id="seg-yt-result" class="hint-text"></div>
          </div>
        </div>
        <div id="seg-tts-fields" class="hidden">
          <div class="form-group">
            <label>TEXT TO SPEAK</label>
            <textarea id="seg-tts-text" class="input-terminal" rows="3" maxlength="500" placeholder="Enter text..."></textarea>
          </div>
        </div>
        <button id="seg-add-btn" class="btn-terminal btn-accent btn-full">ADD TO PLAYLIST</button>
        <div id="seg-error" class="error-msg hidden"></div>
      </div>
    </div>
  </div>

  <!-- Chat Panel -->
  <div id="chat-panel">
    <div id="chat-header" class="panel-header">
      <span>COMMS CHANNEL</span>
      <button id="chat-toggle" class="btn-close">▼</button>
    </div>
    <div id="chat-body">
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <input type="text" id="chat-input" class="input-terminal" placeholder="MESSAGE..." maxlength="200">
        <button id="chat-send" class="btn-terminal btn-accent">TX</button>
      </div>
    </div>
  </div>

  <!-- Map pick location hint -->
  <div id="map-pick-hint" class="hidden">
    <span>CLICK MAP TO SET STATION LOCATION</span>
    <button id="map-pick-cancel" class="btn-terminal">CANCEL</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/map.js"></script>
  <script src="/js/station.js"></script>
  <script src="/js/segments.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
